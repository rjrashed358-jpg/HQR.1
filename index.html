<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <link rel="stylesheet" href="/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="h-screen flex flex-col bg-gray-50 text-gray-900">
  <header class="bg-white border-b border-gray-200 px-6 py-4 shadow-sm shrink-0 flex justify-between items-center">
    <h1 class="text-xl font-semibold text-gray-800">AI Chat Assistant</h1>
    <button 
      id="download-pdf-button"
      class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium px-4 py-2 rounded-lg transition-colors border border-gray-200"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      Download PDF
    </button>
  </header>

  <main id="chat-history" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
    <!-- Chat messages will be appended here -->
  </main>

  <footer class="bg-white border-t border-gray-200 p-4 shrink-0">
    <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
      <input 
        type="text" 
        id="chat-input" 
        class="flex-1 rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow"
        placeholder="Type your message here..."
        autocomplete="off"
        required
      >
      <button 
        type="submit" 
        id="send-button"
        class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-3 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Send
      </button>
    </form>
  </footer>

<script type="importmap">
  {
    "imports": {
      "marked": "https://esm.sh/marked@^15.0.8",
      "openai": "https://esm.sh/openai@^4.94.0"
    }
  }
</script>

<script type="module" src="/index.ts"></script>
</body>
</html>
